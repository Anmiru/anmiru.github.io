<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="home-title">AnMi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/home2.css">
</head>
<body class="home-page home2-page">

    <div class="bg-solid"></div>
    <div class="bg-pattern"></div>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar2" id="navbar">
        <a href="home.html" class="nav-logo">
            <span class="logo-an">An</span><span class="logo-mi">Mi</span>
        </a>

        <div class="nav-links2">
            <a href="home.html"       class="nav-link2 nav-active2" data-i18n="nav-home">Início</a>
            <a href="anlist.html"     class="nav-link2" data-i18n="nav-animes">Animes</a>
            <a href="home.html#about" class="nav-link2" data-i18n="nav-about">Sobre</a>
        </div>

        <div class="nav-search-wrap" id="navSearchWrap">
            <div class="nav-search-box">
                <svg class="ns-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" class="ns-input" id="navSearch" placeholder="Buscar anime..." autocomplete="off" spellcheck="false">
                <kbd class="ns-kbd">ESC</kbd>
            </div>
            <div class="ns-results" id="nsResults"></div>
        </div>

        <div class="nav-right">
            <div class="lang-menu-wrap" id="langMenuWrap">
                <button class="lang-globe-btn" id="langGlobeBtn" aria-label="Idioma">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><path d="M2 12h20"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <div class="lang-option" id="btn-pt"><span class="lang-flag">🇧🇷</span> Português</div>
                    <div class="lang-option" id="btn-en"><span class="lang-flag">🇺🇸</span> English</div>
                </div>
            </div>
            <!-- Ícone de perfil / admin -->
            <button class="nav-burger" id="burger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <a href="home.html"       class="mobile-link" data-i18n="nav-home">Início</a>
        <a href="anlist.html"     class="mobile-link" data-i18n="nav-animes">Animes</a>
        <a href="home.html#about" class="mobile-link" data-i18n="nav-about">Sobre</a>
        <div class="mobile-lang">
            <span class="lang-opt" id="btn-pt-m">PT</span>
            <span class="lang-sep">|</span>
            <span class="lang-opt" id="btn-en-m">EN</span>
        </div>
    </div>

    <!-- ===== HERO SPOTLIGHT ===== -->
    <section class="spotlight" id="spotlight">
        <div class="spotlight-bg" id="spotlightBg"></div>
        <div class="spotlight-overlay"></div>

        <div class="spotlight-content">
            <div class="spot-badge">
                <span class="spot-badge-dot"></span>
                <span>EM DESTAQUE</span>
            </div>
            <h2 class="spot-title" id="spotTitle"></h2>
            <div class="spot-tags" id="spotTags"></div>
            <p class="spot-synopsis" id="spotSynopsis"></p>
            <div class="spot-actions">
                <a href="#" class="spot-btn-watch" id="spotWatch">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <span>Assistir agora</span>
                </a>
                <a href="#" class="spot-btn-info" id="spotInfo">Ver detalhes</a>
            </div>
        </div>

        <div class="spot-dots" id="spotDots"></div>

        <div class="spot-cover-wrap">
            <div class="spot-cover-glow"></div>
            <img class="spot-cover-img" id="spotCover" src="" alt="">
        </div>

        <div class="spot-kanji">アニメ</div>
    </section>

    <!-- ===== CATÁLOGO ===== -->
    <section class="catalog" id="catalog">
        <div class="catalog-toolbar">
            <div class="toolbar-left">
                <h2 class="catalog-title" data-i18n="catalog-title">Catálogo</h2>
                <span class="catalog-count" id="catalogCount"></span>
            </div>
            <div class="toolbar-filters">
                <div class="filter-search-mobile">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" id="mobileSearch" placeholder="Buscar...">
                </div>
                <div class="filter-group" id="filterGenre">
                    <button class="filter-chip active" data-genre="all">Todos</button>
                    <button class="filter-chip" data-genre="Romance">Romance</button>
                    <button class="filter-chip" data-genre="Drama">Drama</button>
                    <button class="filter-chip" data-genre="Ação">Ação</button>
                    <button class="filter-chip" data-genre="Fantasia">Fantasia</button>
                </div>
                <div class="filter-select-wrap">
                    <select class="filter-select" id="filterStatus">
                        <option value="all">Status</option>
                        <option value="Completo">Completo</option>
                        <option value="Em exibição">Em exibição</option>
                    </select>
                </div>
                <div class="filter-select-wrap">
                    <select class="filter-select" id="filterSort">
                        <option value="default">Ordenar</option>
                        <option value="rating">Melhor avaliação</option>
                        <option value="year">Mais recente</option>
                        <option value="name">A → Z</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="anime-grid2" id="animeGrid"></div>

        <div class="empty-state" id="emptyState" style="display:none">
            <div class="empty-icon">( ˘︹˘ )</div>
            <p class="empty-text">Nenhum anime encontrado com esses filtros.</p>
        </div>
    </section>

    <!-- ===== SOBRE ===== -->
    <section class="about" id="about">
        <div class="about-inner">
            <h2 class="about-title" data-i18n="about-title"></h2>
            <p class="about-text" data-i18n="about-text"></p>
            <a href="https://discord.gg/placeholder" target="_blank" class="btn-primary" data-i18n="about-btn-discord"></a>
        </div>
    </section>

    <footer class="footer">
        <span class="footer-logo"><span class="logo-an">An</span><span class="logo-mi">Mi</span></span>
        <span class="footer-sep">·</span>
        <span class="footer-copy" data-i18n="footer-copy"></span>
    </footer>

    
    <script src="js/script.js"></script>
    <script>
    // ── GLOBO DE IDIOMA ──
    const langGlobeBtn = document.getElementById('langGlobeBtn');
    const langMenuWrap = document.getElementById('langMenuWrap');
    const langDropdown = document.getElementById('langDropdown');
    if (langGlobeBtn) {
        langGlobeBtn.addEventListener('click', e => { e.stopPropagation(); langMenuWrap.classList.toggle('open'); });
        document.addEventListener('click', () => langMenuWrap.classList.remove('open'));
        langDropdown.addEventListener('click', e => e.stopPropagation());
        document.getElementById('btn-pt').addEventListener('click', () => { loadLanguage('pt_BR'); langMenuWrap.classList.remove('open'); });
        document.getElementById('btn-en').addEventListener('click', () => { loadLanguage('en');    langMenuWrap.classList.remove('open'); });
    }

    // ── NAVBAR ──
    const burger     = document.getElementById('burger');
    const mobileMenu = document.getElementById('mobileMenu');
    const navbar     = document.getElementById('navbar');

    burger.addEventListener('click', () => {
        burger.classList.toggle('open');
        mobileMenu.classList.toggle('open');
    });
    document.querySelectorAll('.mobile-link').forEach(l => l.addEventListener('click', () => {
        burger.classList.remove('open');
        mobileMenu.classList.remove('open');
    }));
    ['btn-pt-m','btn-en-m'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('click', () => loadLanguage(id.includes('pt') ? 'pt_BR' : 'en'));
    });
    window.addEventListener('scroll', () => {
        navbar.classList.toggle('scrolled', window.scrollY > 10);
    });

    // ── DADOS ──
    // Usamos nomes distintos (home_*) para não conflitar com as vars globais do script.js
    // IDs lidos dinamicamente do site-config.json
    let home_ANIME_IDS     = [];  // todos os animes
    let home_SPOTLIGHT_IDS = [];  // só os do spotlight, na ordem certa
    let home_t         = null;
    let home_json      = null;
    let home_animes    = [];
    let home_built     = false;

    // SPOT_BG — lido do site-config.json (campo bgImg por anime)
    let SPOT_BG = {};

    // Mapa de cores por gênero (espelho do CSS)
    const GENRE_COLORS = {
        'Romance':       'g-romance',
        'Drama':         'g-drama',
        'Ação':          'g-acao',
        'Fantasia':      'g-fantasia',
        'Aventura':      'g-aventura',
        'Comédia':       'g-comedia',
        'Terror':        'g-terror',
        'Sci-Fi':        'g-sci-fi',
        'Slice of Life': 'g-slice',
    };
    function gClass(g) { return GENRE_COLORS[g] || 'g-default'; }

    // Lê site-config.json (ordem do spotlight + lista de animes) e animes.json em paralelo
    Promise.all([
        fetch('data/site-config.json').then(r=>r.json()).catch(()=>null),
        fetch('data/animes.json').then(r=>r.json()).catch(()=>({}))
    ]).then(([cfg, animesData]) => {
        home_json = animesData;
        if (cfg) {
            // ANIME_IDS dinâmico — todos os animes do JSON
            home_ANIME_IDS = cfg.animeIds || Object.keys(animesData);
            // Spotlight: só os ativos, na ordem definida no painel
            if (cfg.spotlight && cfg.spotlight.length) {
                home_SPOTLIGHT_IDS = cfg.spotlight.filter(s=>s.active).map(s=>s.id);
            } else {
                home_SPOTLIGHT_IDS = home_ANIME_IDS;
            }
            // SPOT_BG do config
            if (cfg.spotBg) SPOT_BG = cfg.spotBg;
        } else {
            home_ANIME_IDS    = Object.keys(animesData);
            home_SPOTLIGHT_IDS = home_ANIME_IDS;
        }
        homeTryBuild();
    });

    // O script.js expõe window._anmiTranslations quando termina o fetch de idioma
    // e também dispara translationsLoaded. Escutamos os dois para garantir.
    document.addEventListener('translationsLoaded', (e) => {
        home_t = e.detail;
        home_built = false; // permite rebuild ao trocar idioma
        homeTryBuild();
    });

    function homePollTranslations() {
        if (home_t) return;
        if (window._anmiTranslations && Object.keys(window._anmiTranslations).length) {
            home_t = window._anmiTranslations;
            homeTryBuild();
        } else {
            setTimeout(homePollTranslations, 60);
        }
    }
    setTimeout(homePollTranslations, 80);

    function homeTryBuild() {
        if (home_built || !home_t || home_json === null) return;
        home_built = true;
        home_animes = home_ANIME_IDS.map(id => {
            const t = home_t;
            const jd = home_json[id] || {};
            const cover    = t[`aninfo-cover-${id}`]    || jd.cover || '';
            const title    = t[`aninfo-title-${id}`]    || id;
            const genre    = t[`aninfo-genre-${id}`]    || '';
            const status   = t[`aninfo-status-${id}`]   || '';
            const episodes = t[`aninfo-episodes-${id}`] || '';
            const year     = t[`aninfo-year-${id}`]     || '';
            const rating   = t[`aninfo-rating-${id}`]   || '';
            const synopsis = t[`aninfo-synopsis-${id}`] || '';
            const genres   = genre.split(',').map(g => g.trim()).filter(Boolean);
            const bgImg    = SPOT_BG[id] || cover;
            return { id, cover, bgImg, title, genre, genres, status, episodes, year, rating, synopsis };
        });
        homeRenderSpotlight();
        homeRenderCatalog();
    }

    // ── SPOTLIGHT ──
    let spotIdx   = 0;
    let spotTimer = null;

    // Animes só do spotlight (filtrado + ordenado pelo painel)
    let home_spotlight = [];

    function homeRenderSpotlight() {
        // Filtra home_animes para só os IDs do spotlight, na ordem certa
        home_spotlight = home_SPOTLIGHT_IDS.length
            ? home_SPOTLIGHT_IDS.map(id => home_animes.find(a=>a.id===id)).filter(Boolean)
            : home_animes;
        if (!home_spotlight.length) return;

        const dotsEl = document.getElementById('spotDots');
        dotsEl.innerHTML = '';
        // Dots e timer só com 2+ animes no destaque
        if (home_spotlight.length >= 2) {
            home_spotlight.forEach((_, i) => {
                const d = document.createElement('button');
                d.className = 'spot-dot' + (i === 0 ? ' active' : '');
                d.addEventListener('click', () => { homeShowSpot(i); homeRestartTimer(); });
                dotsEl.appendChild(d);
            });
            homeStartTimer();
        }
        homeShowSpot(0);
    }

    function homeShowSpot(idx) {
        const a = home_spotlight[idx];
        if (!a) return;
        spotIdx = idx;

        // Fundo: imagem customizada ou capa como fallback
        document.getElementById('spotlightBg').style.backgroundImage = `url('${a.bgImg}')`;

        // Capa lateral
        const img = document.getElementById('spotCover');
        img.src = a.cover; img.alt = a.title;

        // Textos
        document.getElementById('spotTitle').textContent    = a.title;
        document.getElementById('spotSynopsis').textContent = a.synopsis;

        // Tags
        const tagsEl = document.getElementById('spotTags');
        tagsEl.innerHTML = '';
        if (a.year)     tagsEl.innerHTML += `<span class="spot-tag">${a.year}</span>`;
        if (a.rating)   tagsEl.innerHTML += `<span class="spot-tag spot-tag-rating">★ ${a.rating}</span>`;
        a.genres.slice(0,2).forEach(g => tagsEl.innerHTML += `<span class="spot-tag spot-tag-genre ${gClass(g)}">${g}</span>`);
        if (a.genres.length > 2) tagsEl.innerHTML += `<span class="spot-tag spot-tag-outros" title="${a.genres.slice(2).join(', ')}">Outros</span>`;
        if (a.episodes) tagsEl.innerHTML += `<span class="spot-tag">${a.episodes} ep.</span>`;

        // Links
        document.getElementById('spotWatch').href = `aninfo.html?anime=${a.id}`;
        document.getElementById('spotInfo').href  = `aninfo.html?anime=${a.id}`;

        // Dots
        document.querySelectorAll('.spot-dot').forEach((d, i) => d.classList.toggle('active', i === idx));

        // Animação
        const content = document.querySelector('.spotlight-content');
        content.classList.remove('spot-anim');
        void content.offsetWidth;
        content.classList.add('spot-anim');
    }

    function homeStartTimer() {
        if (home_spotlight.length < 2) return; // sem rotação com 1 anime
        spotTimer = setInterval(() => homeShowSpot((spotIdx + 1) % home_spotlight.length), 7000);
    }
    function homeRestartTimer() { clearInterval(spotTimer); homeStartTimer(); }

    // ── CATÁLOGO + FILTROS ──
    let activeGenre  = 'all';
    let activeStatus = 'all';
    let activeSort   = 'default';
    let searchQuery  = '';

    function homeRenderCatalog() {
        const filtered = homeGetFiltered();
        const grid  = document.getElementById('animeGrid');
        const empty = document.getElementById('emptyState');
        document.getElementById('catalogCount').textContent = `${filtered.length} anime${filtered.length !== 1 ? 's' : ''}`;
        if (!filtered.length) { grid.innerHTML = ''; empty.style.display = 'flex'; return; }
        empty.style.display = 'none';
        grid.innerHTML = filtered.map((a, i) => `
            <div class="anime-card2" style="animation-delay:${i * 0.07}s" onclick="window.location='aninfo.html?anime=${a.id}'">
                <div class="ac2-img-wrap">
                    <img src="${a.cover}" alt="${a.title}" loading="lazy">
                    <div class="ac2-shine"></div>
                    ${a.rating ? `<div class="ac2-rating">★ ${a.rating}</div>` : ''}
                    <div class="ac2-hover-overlay">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </div>
                <div class="ac2-info">
                    <span class="ac2-title">${a.title}</span>
                    <span class="ac2-meta">${a.year || ''}</span>
                    <div class="ac2-genres">
                        ${a.genres.slice(0,2).map(g=>`<span class="ac2-genre-chip ${gClass(g)}">${g}</span>`).join('')}
                        ${a.genres.length > 2 ? `<span class="ac2-genre-chip g-default" style="font-style:italic" title="${a.genres.slice(2).join(', ')}">Outros</span>` : ''}
                    </div>
                </div>
                ${a.status ? `<span class="ac2-status ${a.status === 'Completo' || a.status === 'Complete' ? 'status-done' : 'status-airing'}">${a.status}</span>` : ''}
            </div>
        `).join('');
    }

    function homeGetFiltered() {
        let list = [...home_animes];
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            list = list.filter(a => a.title.toLowerCase().includes(q));
        }
        if (activeGenre !== 'all') list = list.filter(a => a.genres.includes(activeGenre));
        if (activeStatus !== 'all') list = list.filter(a =>
            a.status === activeStatus || (activeStatus === 'Completo' && a.status === 'Complete'));
        if (activeSort === 'rating') list.sort((a,b) => parseFloat(b.rating) - parseFloat(a.rating));
        else if (activeSort === 'year') list.sort((a,b) => parseInt(b.year) - parseInt(a.year));
        else if (activeSort === 'name') list.sort((a,b) => a.title.localeCompare(b.title));
        return list;
    }

    document.getElementById('filterGenre').addEventListener('click', e => {
        const chip = e.target.closest('.filter-chip');
        if (!chip) return;
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeGenre = chip.dataset.genre;
        homeRenderCatalog();
    });
    document.getElementById('filterStatus').addEventListener('change', e => { activeStatus = e.target.value; homeRenderCatalog(); });
    document.getElementById('filterSort').addEventListener('change',   e => { activeSort   = e.target.value; homeRenderCatalog(); });
    document.getElementById('mobileSearch').addEventListener('input',  e => { searchQuery  = e.target.value.trim(); homeRenderCatalog(); });

    // ── BUSCA NAVBAR ──
    const navSearchInput = document.getElementById('navSearch');
    const nsResults      = document.getElementById('nsResults');

    navSearchInput.addEventListener('input', () => {
        const q = navSearchInput.value.trim().toLowerCase();
        if (!q) { nsResults.innerHTML = ''; nsResults.classList.remove('open'); return; }
        const found = home_animes.filter(a =>
            a.title.toLowerCase().includes(q)
        ).slice(0, 5);
        if (!found.length) {
            nsResults.innerHTML = `<div class="ns-empty">Nenhum resultado</div>`;
        } else {
            nsResults.innerHTML = found.map(a => `
                <a class="ns-item" href="aninfo.html?anime=${a.id}">
                    <img src="${a.cover}" alt="${a.title}">
                    <div class="ns-item-info">
                        <span class="ns-item-title">${a.title}</span>
                        <span class="ns-item-meta">${a.year || ''} ${a.genres.slice(0,2).map(g=>`<span style="font-size:0.68rem;padding:0.1rem 0.4rem;border-radius:10px" class="${gClass(g)}">${g}</span>`).join('')}${a.genres.length > 2 ? `<span style="font-size:0.68rem;padding:0.1rem 0.4rem;border-radius:10px;font-style:italic" class="g-default">Outros</span>` : ''}</span>
                    </div>
                </a>
            `).join('');
        }
        nsResults.classList.add('open');
    });
    navSearchInput.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            navSearchInput.value = ''; nsResults.innerHTML = ''; nsResults.classList.remove('open'); navSearchInput.blur();
        }
    });
    document.addEventListener('click', e => {
        if (!document.getElementById('navSearchWrap').contains(e.target)) nsResults.classList.remove('open');
    });
        </script>
</body>
