<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="anlist-title">Lista de Animes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/home2.css">
    <link rel="stylesheet" href="css/anlist.css">
</head>
<body class="home-page anlist-page">

<div class="bg-solid"></div>
<div class="bg-pattern"></div>

<!-- ===== NAVBAR ===== -->
<nav class="navbar2 scrolled" id="navbar">
    <a href="home.html" class="nav-logo">
        <span class="logo-an">An</span><span class="logo-mi">Mi</span>
    </a>
    <div class="nav-links2">
        <a href="home.html"       class="nav-link2" data-i18n="nav-home">Início</a>
        <a href="anlist.html"     class="nav-link2 nav-active2" data-i18n="nav-animes">Animes</a>
        <a href="home.html#about" class="nav-link2" data-i18n="nav-about">Sobre</a>
    </div>

    <!-- Busca navbar -->
    <div class="nav-search-wrap" id="navSearchWrap">
        <div class="nav-search-box">
            <svg class="ns-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" class="ns-input" id="navSearch" placeholder="Buscar anime..." autocomplete="off" spellcheck="false">
            <kbd class="ns-kbd">ESC</kbd>
        </div>
        <div class="ns-results" id="nsResults"></div>
    </div>

    <div class="nav-right">
        <button class="nav-burger" id="burger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
    <a href="home.html"       class="mobile-link" data-i18n="nav-home">Início</a>
    <a href="anlist.html"     class="mobile-link" data-i18n="nav-animes">Animes</a>
    <a href="home.html#about" class="mobile-link" data-i18n="nav-about">Sobre</a>
</div>

<!-- ===== LAYOUT PRINCIPAL ===== -->
<div class="anlist-layout">

    <!-- GRID DE CARDS -->
    <main class="anlist-main">
        <div class="anlist-header-row">
            <h1 class="anlist-heading" data-i18n="anlist-title">Lista de Animes</h1>
            <span class="anlist-count" id="anlistCount"></span>
        </div>
        <div class="anime-grid" id="animeGrid"></div>
        <div class="anlist-empty" id="anlistEmpty" style="display:none">
            <div class="empty-icon">( ˘︹˘ )</div>
            <p>Nenhum anime encontrado.</p>
        </div>
    </main>

    <!-- SIDEBAR DIREITA -->
    <aside class="anlist-sidebar">

        <!-- Busca rápida na sidebar -->
        <div class="sidebar-block">
            <h3 class="sidebar-block-title">Buscar</h3>
            <div class="sidebar-search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="sidebarSearch" placeholder="Nome do anime...">
            </div>
        </div>

        <!-- Filtro por gênero -->
        <div class="sidebar-block">
            <h3 class="sidebar-block-title">Gênero</h3>
            <div class="sidebar-genres" id="sidebarGenres"></div>
        </div>

        <!-- Filtro por ano -->
        <div class="sidebar-block">
            <h3 class="sidebar-block-title">Ano</h3>
            <div class="sidebar-years" id="sidebarYears"></div>
        </div>

        <!-- Filtro por status -->
        <div class="sidebar-block">
            <h3 class="sidebar-block-title">Status</h3>
            <div class="sidebar-status">
                <label class="sidebar-radio"><input type="radio" name="status" value="all" checked> Todos</label>
                <label class="sidebar-radio"><input type="radio" name="status" value="Completo"> Completo</label>
                <label class="sidebar-radio"><input type="radio" name="status" value="Em exibição"> Em exibição</label>
            </div>
        </div>

        <!-- Limpar filtros -->
        <button class="sidebar-clear" id="sidebarClear">✕ Limpar filtros</button>

        <!-- Paginação -->
        <div class="sidebar-block" id="paginationBlock" style="display:none">
            <h3 class="sidebar-block-title">Páginas</h3>
            <div class="pagination-wrap" id="paginationWrap"></div>
        </div>

    </aside>
</div>

<footer class="footer">
    <span class="footer-logo"><span class="logo-an">An</span><span class="logo-mi">Mi</span></span>
    <span class="footer-sep">·</span>
    <span class="footer-copy" data-i18n="footer-copy"></span>
</footer>

<script src="js/script.js"></script>
<script>
// ── NAVBAR BURGER ──
const burger     = document.getElementById('burger');
const mobileMenu = document.getElementById('mobileMenu');
burger.addEventListener('click', () => {
    burger.classList.toggle('open');
    mobileMenu.classList.toggle('open');
});
document.querySelectorAll('.mobile-link').forEach(l => l.addEventListener('click', () => {
    burger.classList.remove('open');
    mobileMenu.classList.remove('open');
}));

// ── DADOS ──
let al_ANIME_IDS = []; // lido do site-config.json
let al_t    = null;
let al_json = null;
let al_list = [];

const GENRE_COLORS = {
    'Romance':'g-romance','Drama':'g-drama','Ação':'g-acao',
    'Fantasia':'g-fantasia','Aventura':'g-aventura','Comédia':'g-comedia',
    'Terror':'g-terror','Sci-Fi':'g-sci-fi','Slice of Life':'g-slice',
};
function gClass(g) { return GENRE_COLORS[g] || 'g-default'; }

Promise.all([
    fetch('data/site-config.json').then(r=>r.json()).catch(()=>null),
    fetch('data/animes.json').then(r=>r.json()).catch(()=>({}))
]).then(([cfg, animesData]) => {
    al_json = animesData;
    al_ANIME_IDS = cfg && cfg.animeIds ? cfg.animeIds : Object.keys(animesData);
    alTryBuild();
});
document.addEventListener('translationsLoaded', e => { al_t = e.detail; alTryBuild(); });
function alPoll() {
    if (al_t) return;
    if (window._anmiTranslations && Object.keys(window._anmiTranslations).length) { al_t = window._anmiTranslations; alTryBuild(); }
    else setTimeout(alPoll, 60);
}
setTimeout(alPoll, 80);

function alTryBuild() {
    if (!al_t || al_json === null || al_list.length) return;
    al_list = al_ANIME_IDS.map(id => {
        const jd = al_json[id] || {};
        const cover    = al_t[`aninfo-cover-${id}`]    || jd.cover || '';
        const title    = al_t[`aninfo-title-${id}`]    || id;
        const genre    = al_t[`aninfo-genre-${id}`]    || '';
        const status   = al_t[`aninfo-status-${id}`]   || '';
        const episodes = al_t[`aninfo-episodes-${id}`] || '';
        const year     = al_t[`aninfo-year-${id}`]     || '';
        const rating   = al_t[`aninfo-rating-${id}`]   || '';
        const genres   = genre.split(',').map(g=>g.trim()).filter(Boolean);
        return { id, cover, title, genre, genres, status, episodes, year, rating };
    });
    buildSidebar();
    renderGrid();
}

// ── FILTROS ──
let fSearch = '';
let fGenres = new Set(); // múltiplos gêneros
let fYears  = new Set();
let fStatus = 'all';

function getFiltered() {
    return al_list.filter(a => {
        if (fSearch && !a.title.toLowerCase().includes(fSearch)) return false;
        if (fGenres.size && ![...fGenres].every(g => a.genres.includes(g))) return false;
        if (fYears.size  && !fYears.has(a.year)) return false;
        if (fStatus !== 'all' && a.status !== fStatus &&
            !(fStatus === 'Completo' && a.status === 'Complete')) return false;
        return true;
    });
}

// ── SIDEBAR ──
function buildSidebar() {
    // Gêneros dinâmicos — todos os que existem
    const allGenres = [...new Set(al_list.flatMap(a => a.genres))].sort();
    const genresEl  = document.getElementById('sidebarGenres');
    genresEl.innerHTML = allGenres.map(g => `
        <button class="sg-chip ${gClass(g)}" data-genre="${g}" onclick="toggleGenre('${g}',this)">${g}</button>
    `).join('');

    // Anos dinâmicos
    const allYears = [...new Set(al_list.map(a=>a.year).filter(Boolean))].sort((a,b)=>b-a);
    const yearsEl  = document.getElementById('sidebarYears');
    yearsEl.innerHTML = allYears.map(y => `
        <button class="sy-chip" data-year="${y}" onclick="toggleYear('${y}',this)">${y}</button>
    `).join('');
}

function toggleGenre(g, el) {
    if (fGenres.has(g)) { fGenres.delete(g); el.classList.remove('active'); }
    else                { fGenres.add(g);    el.classList.add('active'); }
    renderGrid();
}
function toggleYear(y, el) {
    if (fYears.has(y)) { fYears.delete(y); el.classList.remove('active'); }
    else               { fYears.add(y);    el.classList.add('active'); }
    renderGrid();
}

document.querySelectorAll('input[name="status"]').forEach(r =>
    r.addEventListener('change', e => { fStatus = e.target.value; renderGrid(); })
);
document.getElementById('sidebarSearch').addEventListener('input', e => {
    fSearch = e.target.value.trim().toLowerCase(); renderGrid();
});
document.getElementById('sidebarClear').addEventListener('click', () => {
    fSearch = ''; fGenres.clear(); fYears.clear(); fStatus = 'all'; currentPage = 1;
    document.getElementById('sidebarSearch').value = '';
    document.querySelectorAll('input[name="status"]')[0].checked = true;
    document.querySelectorAll('.sg-chip,.sy-chip').forEach(c=>c.classList.remove('active'));
    renderGrid();
});

// ── RENDER GRID ──
const PER_PAGE = 12;
let currentPage = 1;

function renderGrid() {
    const filtered   = getFiltered();
    const grid       = document.getElementById('animeGrid');
    const empty      = document.getElementById('anlistEmpty');
    const totalPages = Math.ceil(filtered.length / PER_PAGE);
    if (currentPage > totalPages) currentPage = 1;

    document.getElementById('anlistCount').textContent = `${filtered.length} anime${filtered.length!==1?'s':''}`;
    if (!filtered.length) { grid.innerHTML=''; empty.style.display='flex'; renderPagination(0,0); return; }
    empty.style.display = 'none';

    const start = (currentPage - 1) * PER_PAGE;
    const page  = filtered.slice(start, start + PER_PAGE);

    grid.innerHTML = page.map((a,i) => `
        <div class="anime-card" style="animation-delay:${i*0.05}s" onclick="window.location='aninfo.html?anime=${a.id}'">
            <div class="card-img-wrap">
                <img src="${a.cover}" alt="${a.title}" loading="lazy">
                <div class="card-shine"></div>
                ${a.rating ? `<div class="card-rating">★ ${a.rating}</div>` : ''}
                <div class="card-hover-play">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </div>
            </div>
            <div class="card-info">
                <span class="card-title">${a.title}</span>
                <div class="card-genres">
                    ${a.genres.slice(0,2).map(g=>`<span class="card-genre-chip ${gClass(g)}">${g}</span>`).join('')}
                    ${a.genres.length > 2 ? `<span class="card-genre-chip g-default" style="font-style:italic" title="${a.genres.slice(2).join(', ')}">Outros</span>` : ''}
                </div>
            </div>
        </div>
    `).join('');

    renderPagination(currentPage, totalPages);
}

function renderPagination(current, total) {
    const block = document.getElementById('paginationBlock');
    const wrap  = document.getElementById('paginationWrap');
    if (total <= 1) { block.style.display='none'; return; }
    block.style.display = '';
    let html = `<button class="pg-btn${current===1?' pg-disabled':''}" onclick="goPage(${current-1})" ${current===1?'disabled':''}>‹ Ant.</button>`;
    for (let i=1; i<=total; i++) {
        if (total>6 && i>2 && i<total-1 && Math.abs(i-current)>1) {
            if (i===3||i===total-2) html += `<span class="pg-ellipsis">…</span>`;
            continue;
        }
        html += `<button class="pg-btn${i===current?' pg-active':''}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button class="pg-btn${current===total?' pg-disabled':''}" onclick="goPage(${current+1})" ${current===total?'disabled':''}>Prox. ›</button>`;
    wrap.innerHTML = html;
}

function goPage(n) {
    const total = Math.ceil(getFiltered().length / PER_PAGE);
    if (n<1||n>total) return;
    currentPage = n;
    renderGrid();
    document.querySelector('.anlist-main').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── BUSCA NAVBAR ──
const navSearchInput = document.getElementById('navSearch');
const nsResults      = document.getElementById('nsResults');
navSearchInput.addEventListener('input', () => {
    const q = navSearchInput.value.trim().toLowerCase();
    if (!q) { nsResults.innerHTML=''; nsResults.classList.remove('open'); return; }
    const found = al_list.filter(a => a.title.toLowerCase().includes(q)).slice(0,5);
    nsResults.innerHTML = found.length
        ? found.map(a=>`
            <a class="ns-item" href="aninfo.html?anime=${a.id}">
                <img src="${a.cover}" alt="${a.title}">
                <div class="ns-item-info">
                    <span class="ns-item-title">${a.title}</span>
                    <span class="ns-item-meta">${a.year||''} ${a.genres.map(g=>`<span style="font-size:0.68rem;padding:0.1rem 0.4rem;border-radius:10px" class="${gClass(g)}">${g}</span>`).join('')}</span>
                </div>
            </a>`).join('')
        : `<div class="ns-empty">Nenhum resultado</div>`;
    nsResults.classList.add('open');
});
navSearchInput.addEventListener('keydown', e => {
    if (e.key==='Escape') { navSearchInput.value=''; nsResults.innerHTML=''; nsResults.classList.remove('open'); navSearchInput.blur(); }
});
document.addEventListener('click', e => {
    if (!document.getElementById('navSearchWrap').contains(e.target)) nsResults.classList.remove('open');
});
</script>
</body>
</html>
