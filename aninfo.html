<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnMi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home2.css">
    <link rel="stylesheet" href="css/aninfo.css">
    <link rel="stylesheet" href="css/episodes.css">
</head>
<body class="aninfo-body">

<div class="bg-solid"></div>
<div class="bg-pattern"></div>
<div class="bg-blur-cover" id="bgBlur"></div>

<header class="aninfo-header">
    <a href="anlist.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
        <span data-i18n="back-btn">Voltar</span>
    </a>
    <a href="home.html" class="nav-logo" style="font-family:'Cinzel Decorative',cursive;font-size:1.1rem;text-decoration:none;position:absolute;left:50%;transform:translateX(-50%)">
        <span class="logo-an">An</span><span class="logo-mi">Mi</span>
    </a>
</header>

<main class="aninfo-main">

    <!-- CARD PRINCIPAL -->
    <div class="aninfo-card">
        <div class="cover-col">
            <div class="cover-wrap">
                <img id="animeCover" src="" alt="">
                <div class="cover-shine"></div>
            </div>
            <div class="rating-badge" id="animeRating"></div>
        </div>

        <div class="info-col">
            <h1 class="anime-title" id="animeTitle"></h1>

            <!-- Tags de gênero separadas + "Outros" automático -->
            <div class="tags-row" id="tagsRow"></div>

            <div class="meta-row">
                <div class="meta-item">
                    <span class="meta-label" data-i18n="label-episodes"></span>
                    <span class="meta-value" id="animeEpisodes"></span>
                </div>
                <div class="meta-divider"></div>
                <div class="meta-item">
                    <span class="meta-label" data-i18n="label-year"></span>
                    <span class="meta-value" id="animeYear"></span>
                </div>
            </div>

            <!-- ABAS: Sinopse | Informações -->
            <div class="aninfo-tabs">
                <button class="aninfo-tab active" data-tab="synopsis" onclick="switchTab('synopsis',this)">Sinopse</button>
                <button class="aninfo-tab" data-tab="info" onclick="switchTab('info',this)">Informações</button>
            </div>

            <!-- Painel sinopse -->
            <div class="tab-panel active" id="panel-synopsis">
                <p class="synopsis-text" id="animeSynopsis"></p>
            </div>

            <!-- Painel informações -->
            <div class="tab-panel" id="panel-info">
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">Tradutor</span>
                        <span class="info-value" id="infoTranslator">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Resolução</span>
                        <span class="info-value" id="infoResolution">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Formato</span>
                        <span class="info-value" id="infoFormat">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Total de Episódios</span>
                        <span class="info-value" id="infoTotalEp">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Temporadas</span>
                        <span class="info-value" id="infoSeasons">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Status</span>
                        <span class="info-value" id="infoStatus">—</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>

<!-- EPISÓDIOS — fora do main, abaixo do card, largura contida -->
<div class="aninfo-eps-wrap">
    <section class="episodes-section" id="episodesSection" style="display:none">
        <div id="seasonsContainer"></div>
    </section>
</div>

<script src="js/script.js"></script>
<script>
const animeId = new URLSearchParams(window.location.search).get('anime');

// ── Cores dos gêneros (espelho do site) ──
const GENRE_COLORS = {
    'Romance':'g-romance','Drama':'g-drama','Ação':'g-acao',
    'Fantasia':'g-fantasia','Aventura':'g-aventura','Comédia':'g-comedia',
    'Terror':'g-terror','Sci-Fi':'g-sci-fi','Slice of Life':'g-slice',
};
const MAX_TAGS = Infinity; // aninfo mostra todas as tags
function gClass(g) { return GENRE_COLORS[g] || 'g-default'; }

// ── Dados ──
let animeData    = null;
let episodesData = null;
let i18nData     = null;

fetch('data/animes.json')
    .then(r => r.json())
    .then(index => {
        animeData = index[animeId] || null;
        if (!animeData || !animeData.episodesFile) { tryRender(); return; }
        return fetch(animeData.episodesFile)
            .then(r => r.json())
            .then(epData => { episodesData = epData; tryRender(); })
            .catch(() => { episodesData = {}; tryRender(); });
    })
    .catch(() => { animeData = {}; tryRender(); });

document.addEventListener('translationsLoaded', (e) => {
    i18nData = e.detail;
    tryRender();
});

function tryRender() {
    if (!i18nData || !animeData) return;
    if (animeData.episodesFile && !episodesData) return;

    const t  = i18nData;
    const id = animeId;

    const cover  = t[`aninfo-cover-${id}`] || `img/${id}.jpg`;
    const title  = t[`aninfo-title-${id}`] || id;
    const rating = t[`aninfo-rating-${id}`] || '';
    const genre  = t[`aninfo-genre-${id}`]  || '';
    const status = t[`aninfo-status-${id}`] || '';

    document.title = `${title} — AnMi`;
    document.getElementById('animeCover').src           = cover;
    document.getElementById('animeCover').alt           = title;
    document.getElementById('animeTitle').textContent   = title;
    document.getElementById('animeSynopsis').textContent = t[`aninfo-synopsis-${id}`] || '';
    document.getElementById('animeEpisodes').textContent = t[`aninfo-episodes-${id}`] || '—';
    document.getElementById('animeYear').textContent    = t[`aninfo-year-${id}`]     || '—';
    document.getElementById('animeRating').textContent  = rating ? `★ ${rating}` : '';
    document.getElementById('bgBlur').style.backgroundImage = `url('${cover}')`;

    // ── Tags separadas com limite + "Outros" ──
    const genres = genre.split(',').map(g => g.trim()).filter(Boolean);
    const tagsRow = document.getElementById('tagsRow');
    tagsRow.innerHTML = '';

    // Mostra todos os gêneros sem limite na página do anime
    genres.forEach(g => {
        const span = document.createElement('span');
        span.className = `tag-chip ${gClass(g)}`;
        span.textContent = g;
        tagsRow.appendChild(span);
    });

    // Status tag
    if (status) {
        const s = document.createElement('span');
        s.className = 'tag-chip tag-status-chip';
        s.textContent = status;
        tagsRow.appendChild(s);
    }

    // ── Painel Informações ──
    const seasons  = episodesData ? (episodesData.seasons || []) : [];
    const allEps   = seasons.flatMap(s => s.episodes || []);
    const firstEp  = allEps[0];
    const quality  = firstEp?.qualities?.[0]?.label || '—';
    const fileType = firstEp?.qualities?.[0]?.type?.replace('video/','').toUpperCase() || '—';
    const subLabel = firstEp?.subtitles?.[0]?.label || '—';

    document.getElementById('infoTranslator').textContent  = subLabel !== '—' ? subLabel : 'N/A';
    document.getElementById('infoResolution').textContent  = quality;
    document.getElementById('infoFormat').textContent      = fileType;
    document.getElementById('infoTotalEp').textContent     = allEps.length || t[`aninfo-episodes-${id}`] || '—';
    document.getElementById('infoSeasons').textContent     = seasons.length || '1';
    document.getElementById('infoStatus').textContent      = status || '—';

    // ── Episódios por temporada (abaixo) ──
    const section   = document.getElementById('episodesSection');
    const container = document.getElementById('seasonsContainer');

    if (seasons.length > 0 && allEps.length > 0) {
        section.style.display = '';
        container.innerHTML = '';

        seasons.forEach(season => {
            const eps = season.episodes || [];
            if (!eps.length) return;

            const seasonDiv = document.createElement('div');
            seasonDiv.className = 'season-section';
            seasonDiv.innerHTML = `
                <div class="episodes-header">
                    <h2 class="episodes-title">${season.name || 'Temporada ' + season.num}</h2>
                    <span class="episodes-count">${eps.length} ep.</span>
                </div>
                <div class="episodes-grid" id="grid-s${season.num}"></div>
            `;
            container.appendChild(seasonDiv);

            const grid = seasonDiv.querySelector(`#grid-s${season.num}`);
            eps.forEach(ep => {
                const hasSrc = ep.qualities?.[0]?.src;
                const card = document.createElement('a');
                card.className = 'episode-card';
                card.href = `player.html?anime=${id}&ep=${ep.num}`;
                card.innerHTML = `
                    <div class="ep-thumb ${hasSrc ? 'ep-thumb-loading' : ''}">
                        <img class="ep-thumb-img" src="${cover}" alt="Episódio ${ep.num}" loading="lazy">
                        <div class="ep-play-overlay">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                        <span class="ep-number-badge">${ep.num}</span>
                    </div>
                    <div class="ep-info">
                        <span class="ep-label">Episódio ${ep.num}</span>
                        ${ep.title ? `<span class="ep-title-name">${ep.title}</span>` : ''}
                    </div>
                `;
                grid.appendChild(card);
                if (hasSrc) captureFrame(ep.qualities[0].src, card.querySelector('.ep-thumb-img'), card.querySelector('.ep-thumb'));
            });
        });
    }
}

// ── Abas ──
function switchTab(tab, btn) {
    document.querySelectorAll('.aninfo-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
}

// ── Captura frame do vídeo ──
function captureFrame(src, imgEl, thumbEl) {
    const video = document.createElement('video');
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    video.src = src; video.muted = true; video.preload = 'metadata'; video.crossOrigin = 'anonymous';
    video.addEventListener('loadedmetadata', () => { video.currentTime = Math.min(3, video.duration * 0.05); });
    video.addEventListener('seeked', () => {
        canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 360;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        imgEl.src = canvas.toDataURL('image/jpeg', 0.85);
        thumbEl.classList.remove('ep-thumb-loading');
        video.src = ''; video.load();
    });
    video.addEventListener('error', () => thumbEl.classList.remove('ep-thumb-loading'));
    video.load();
}
</script>
</body>
</html>
